# MoeNet Core - Docker Compose
# Production: docker compose up -d
# Development: docker compose up -d --build

services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-moenet}/api:${VERSION:-latest}
    container_name: moenet-api
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-moenet}
      - DB_USER=${DB_USER:-moenet}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_FROM=${MAILGUN_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moenet-api.rule=Host(`api.moenet.work`)"
      - "traefik.http.routers.moenet-api.entrypoints=websecure"
      - "traefik.http.routers.moenet-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.moenet-api.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-moenet}/bot:${VERSION:-latest}
    container_name: moenet-bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:3000
      - API_TOKEN=${API_TOKEN}
      - TELEGRAM_ADMIN_USERNAME=${TELEGRAM_ADMIN_USERNAME}
      - TELEGRAM_CONTACT=${TELEGRAM_CONTACT:-@heicha}
      - LOCAL_ASN=${LOCAL_ASN:-4242420998}
      - AGENT_PORT=${AGENT_PORT:-8080}
      - AGENT_TOKEN=${AGENT_TOKEN}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8443}
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moenet-bot.rule=Host(`bot.moenet.work`)"
      - "traefik.http.routers.moenet-bot.entrypoints=websecure"
      - "traefik.http.routers.moenet-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.moenet-bot.loadbalancer.server.port=8443"
    networks:
      - default
      - traefik

  postgres:
    image: postgres:16-alpine
    container_name: moenet-postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-moenet}
      - POSTGRES_USER=${DB_USER:-moenet}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-moenet}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moenet-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3
    container_name: moenet-traefik
    restart: always
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=moenet-core_traefik"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@asn.moe"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks:
      - traefik
      - default

volumes:
  postgres_data:
  redis_data:
  traefik_certs:


networks:
  traefik:
    driver: bridge
  default:
    driver: bridge
