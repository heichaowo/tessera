services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: moenet-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=moenet
      - DB_USER=moenet
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - AGENT_API_KEY=${AGENT_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    container_name: moenet-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:3000
      - API_TOKEN=${API_TOKEN}
      - TELEGRAM_ADMIN_USERNAME=${TELEGRAM_ADMIN_USERNAME}
      - TELEGRAM_CONTACT=${TELEGRAM_CONTACT:-@heicha}
      - LOCAL_ASN=${LOCAL_ASN:-4242420998}
      - AGENT_PORT=${AGENT_PORT:-8080}
      - AGENT_TOKEN=${AGENT_TOKEN}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8443}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moenet-bot.rule=Host(`bot.moenet.work`)"
      - "traefik.http.routers.moenet-bot.entrypoints=websecure"
      - "traefik.http.routers.moenet-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.moenet-bot.loadbalancer.server.port=8443"
    networks:
      - default
      - traefik
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: moenet-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=moenet
      - POSTGRES_USER=moenet
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U moenet" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moenet-redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:


networks:
  traefik:
    external: true
